name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    env:
      PYTHONIOENCODING: utf-8
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Smoke test - version
        run: python -m vibecheck --version

      - name: Smoke test - analyze Python
        run: python -m vibecheck examples/python_bad.py

      - name: Smoke test - analyze JavaScript
        run: python -m vibecheck examples/node_bad.js

      - name: Smoke test - analyze Go
        run: python -m vibecheck examples/go_bad.go

      - name: Smoke test - JSON output
        run: python -m vibecheck examples/python_bad.py --json

      - name: Smoke test - debt scan
        run: python -m vibecheck --debt examples
